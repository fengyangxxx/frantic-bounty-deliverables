skill: open-library-book-lookup
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: branded
  canonical_skill: runx/web-fetch
  provider: open-library
  runtime_path: nango

connector_dependency:
  id: open-library-public-search
  provider: open-library
  transport: nango
  auth: none
  base_url: https://openlibrary.org
  docs: https://openlibrary.org/developers/api
  scopes:
    - open-library:search:read

policy:
  allow:
    - provider: open-library
      method: GET
      host: openlibrary.org
      path: /search.json
      scope: open-library:search:read
  deny:
    - mutations
    - credential_material
    - private_user_data

emits:
  - name: open_library_search_result
    packet: runx.open_library.search_result.v1

harness:
  cases:
    - name: open-library-search-fixture
      runner: search
      inputs:
        query: "the left hand of darkness"
        limit: 2
        fixture_path: "fixtures/open-library-search-response.json"
      expect:
        status: sealed

runners:
  search:
    default: true
    type: graph
    inputs:
      query:
        type: string
        required: true
        description: "Open Library search query."
      limit:
        type: number
        required: false
        default: 3
        description: "Maximum result count. The tool caps this at 10."
      fixture_path:
        type: string
        required: false
        description: "Package-relative fixture JSON for deterministic harness replay."
    graph:
      name: open-library-book-lookup
      steps:
        - id: open_library_search
          tool: open_library.search
          inputs:
            query: "$input.query"
            limit: "$input.limit"
            fixture_path: "$input.fixture_path"
